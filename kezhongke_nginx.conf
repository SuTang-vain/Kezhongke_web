server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name kezhongke.cn www.kezhongke.cn 39.105.42.19;

    root /var/www/kezhongke;
    
    location / {
        index home/code.html;
        try_files $uri $uri/ /home/code.html;
    }

    location = /favicon.ico {
        alias /var/www/kezhongke/kezhongke_logo/kezhongke_logo.png;
    }

    location = /about {
        alias /var/www/kezhongke/about/code.html;
    }
    location = /about/ {
        alias /var/www/kezhongke/about/code.html;
    }

    location = /grow {
        alias /var/www/kezhongke/grow/code.html;
    }
    location = /grow/ {
        alias /var/www/kezhongke/grow/code.html;
    }

    location = /journal {
        alias /var/www/kezhongke/journal/code.html;
    }
    location = /journal/ {
        alias /var/www/kezhongke/journal/code.html;
    }

    location = /path {
        alias /var/www/kezhongke/path/code.html;
    }
    location = /path/ {
        alias /var/www/kezhongke/path/code.html;
    }

    location = /atelier {
        alias /var/www/kezhongke/atelier/code.html;
    }
    location = /atelier/ {
        alias /var/www/kezhongke/atelier/code.html;
    }

    location = /article {
        alias /var/www/kezhongke/article/index.html;
    }
    location = /article/ {
        alias /var/www/kezhongke/article/index.html;
    }

    location = /auth {
        alias /var/www/kezhongke/auth/index.html;
    }
    location = /auth/ {
        alias /var/www/kezhongke/auth/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
    }

    location /content/ {
        alias /var/www/kezhongke_content/;
        add_header Access-Control-Allow-Origin *;
        autoindex on;
    }

    location /projects/ {
        alias /var/www/kezhongke_projects/;
        autoindex on;
    }

    location /kezhongke_logo/ {
        alias /var/www/kezhongke/kezhongke_logo/;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|css|js|zip)$ {
        try_files $uri =404;
    }

    error_page 404 /home/code.html;
}
