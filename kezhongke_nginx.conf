server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name kezhongke.cn www.kezhongke.cn 39.105.42.19;

    root /var/www/kezhongke;
    
    location / {
        index home/code.html;
        try_files $uri $uri/ /home/code.html;
    }

    location = /favicon.ico {
        alias /var/www/kezhongke/kezhongke_logo/kezhongke_logo.png;
    }

    location /about {
        index code.html;
        try_files $uri $uri/ /about/code.html;
    }

    location /grow {
        index code.html;
        try_files $uri $uri/ /grow/code.html;
    }

    location /journal {
        index code.html;
        try_files $uri $uri/ /journal/code.html;
    }

    location /path {
        index code.html;
        try_files $uri $uri/ /path/code.html;
    }

    location /atelier {
        index code.html;
        try_files $uri $uri/ /atelier/code.html;
    }

    location /article {
        index index.html;
        try_files $uri $uri/ /article/index.html;
    }

    location /auth {
        index index.html;
        try_files $uri $uri/ /auth/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
    }

    location /content/ {
        alias /var/www/kezhongke_content/;
        add_header Access-Control-Allow-Origin *;
        autoindex on;
    }

    location /projects/ {
        alias /var/www/kezhongke_projects/;
        autoindex on;
    }

    location /kezhongke_logo/ {
        alias /var/www/kezhongke/kezhongke_logo/;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|css|js|zip)$ {
        try_files $uri =404;
    }

    error_page 404 /home/code.html;
}
