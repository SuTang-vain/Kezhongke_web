server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name kezhongke.cn www.kezhongke.cn 39.105.42.19;

    root /var/www/kezhongke;
    index index.html code.html;
    
    location = /favicon.ico {
        alias /var/www/kezhongke/kezhongke_logo/kezhongke_logo.png;
    }

    location = / {
        try_files /home/code.html =404;
    }

    location / {
        try_files $uri $uri/ /home/code.html;
    }

    location = /about {
        try_files /about/code.html =404;
    }

    location /about/ {
        try_files $uri $uri/ /about/code.html;
    }

    location = /grow {
        try_files /grow/code.html =404;
    }

    location /grow/ {
        try_files $uri $uri/ /grow/code.html;
    }

    location = /journal {
        try_files /journal/code.html =404;
    }

    location /journal/ {
        try_files $uri $uri/ /journal/code.html;
    }

    location = /path {
        try_files /path/code.html =404;
    }

    location /path/ {
        try_files $uri $uri/ /path/code.html;
    }

    location = /atelier {
        try_files /atelier/code.html =404;
    }

    location /atelier/ {
        try_files $uri $uri/ /atelier/code.html;
    }

    location = /article {
        try_files /article/index.html =404;
    }

    location /article/ {
        try_files $uri $uri/ /article/index.html;
    }

    location = /auth {
        try_files /auth/index.html =404;
    }

    location /auth/ {
        try_files $uri $uri/ /auth/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
    }

    location ^~ /content/ {
        alias /var/www/kezhongke_content/;
        autoindex off;
        types {
            text/markdown md markdown;
            application/pdf pdf;
            text/plain txt;
        }
        default_type application/octet-stream;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    location /projects/ {
        alias /var/www/kezhongke_projects/;
        autoindex on;
    }

    location /kezhongke_logo/ {
        alias /var/www/kezhongke/kezhongke_logo/;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|css|js|zip)$ {
        try_files $uri =404;
    }

    error_page 404 /home/code.html;
}
