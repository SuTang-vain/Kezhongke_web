services:
  db:
    image: postgres:16-alpine
    container_name: kezhongke-db
    restart: always
    environment:
      POSTGRES_USER: kezhongke
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: kezhongke_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kezhongke-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
