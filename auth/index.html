<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="color-scheme" content="light only"/>
    <title>连接 - Kezhongke</title>
    <link rel="icon" type="image/png" href="/kezhongke_logo/kezhongke_logo.png" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Han+Serif+SC:wght@600;700&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ad2c0d",
                        "on-background": "#261815",
                        "on-surface-variant": "#5a413b",
                        "surface-container": "#ffe9e4",
                        "background": "#fff8f6",
                    },
                    fontFamily: {
                        "serif": ["Source Han Serif SC", "serif"],
                        "sans": ["Inter", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        :root { color-scheme: only light; }
        html, body { background-color: #fff8f6 !important; height: 100%; margin: 0; }
        
        body::before {
            content: "";
            position: fixed;
            inset: -12%;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 218, 214, 0.42) 0%, rgba(255, 218, 214, 0.20) 24%, transparent 54%),
                radial-gradient(circle at 80% 70%, rgba(192, 236, 220, 0.34) 0%, rgba(192, 236, 220, 0.16) 26%, transparent 56%),
                radial-gradient(circle at 58% 22%, rgba(228, 223, 255, 0.16) 0%, transparent 44%),
                linear-gradient(180deg, #fff8f6 0%, #fffaf8 46%, #fff8f6 100%);
            filter: saturate(112%);
            animation: liquidAmbientDrift 18s ease-in-out infinite alternate;
        }
        @keyframes liquidAmbientDrift {
            from { transform: translate3d(-1.2%, -0.8%, 0) scale(1.01); }
            to { transform: translate3d(1.4%, 1.0%, 0) scale(1.04); }
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(40px) saturate(180%) contrast(1.02);
            -webkit-backdrop-filter: blur(40px) saturate(180%) contrast(1.02);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: 
                inset 0 1px 1px rgba(255,255,255,0.6),
                0 18px 60px rgba(173,44,13,0.06),
                0 4px 18px rgba(49,36,30,0.03);
        }

        .liquid-input {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .liquid-input:focus {
            background: rgba(255, 255, 255, 0.45);
            border-color: #ad2c0d;
            box-shadow: 0 0 0 4px rgba(173, 44, 13, 0.08);
        }

        .nav-back {
            background: rgba(255,255,255,0.22);
            border: 1px solid rgba(255,255,255,0.44);
            backdrop-filter: blur(20px);
        }

        #liquid-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            filter: blur(92px) saturate(118%);
            opacity: 0.8;
        }

        .auth-tab.active {
            color: #ad2c0d;
            position: relative;
        }
        .auth-tab.active::after {
            content: "";
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #ff5a1f, #ef2c0b);
            border-radius: 999px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff4b1f, #e82505);
            box-shadow: 0 10px 26px rgba(173,44,13,0.15);
        }
        .btn-primary:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 14px 32px rgba(173,44,13,0.25);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="antialiased text-on-background flex flex-col min-h-screen">
    <canvas id="liquid-canvas"></canvas>

    <!-- Top Nav -->
    <nav class="relative z-50 p-6 flex justify-between items-center">
        <a href="/" class="nav-back flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium hover:scale-105 transition-all">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            <span>返回首页</span>
        </a>
        <div class="font-serif text-2xl font-bold text-primary">Kezhongke</div>
    </nav>

    <main class="relative z-10 flex-1 flex items-center justify-center px-6 pb-12">
        <div class="w-full max-w-[1000px] grid lg:grid-cols-2 gap-12 items-center">
            
            <!-- Left: Brand Context -->
            <div class="hidden lg:block space-y-8">
                <div class="relative w-64 h-64 mx-auto">
                    <div class="absolute inset-0 bg-primary/10 blur-3xl rounded-full scale-150"></div>
                    <img src="/kezhongke_logo/kezhongke_logo_3d.png" alt="Logo" class="relative z-10 w-full h-full object-contain animate-pulse" style="animation-duration: 4s">
                </div>
                <div class="space-y-4 text-center">
                    <h1 class="font-serif text-4xl font-bold leading-tight">在技术与文明之间<br/>重建人的共鸣</h1>
                    <p class="text-on-surface-variant text-lg opacity-80">连接您的数字栖息地，探索 AI 与人文的交响。</p>
                </div>
            </div>

            <!-- Right: Auth Form -->
            <div class="liquid-glass rounded-[2.5rem] p-8 sm:p-12 space-y-8 relative overflow-hidden">
                <div class="flex gap-8 border-b border-black/5 pb-2">
                    <button onclick="switchTab('login')" id="tab-login" class="auth-tab active text-lg font-semibold transition-colors">登录</button>
                    <button onclick="switchTab('register')" id="tab-register" class="auth-tab text-lg font-semibold text-on-surface-variant/60 transition-colors">注册</button>
                </div>

                <!-- Shared Error Message Area -->
                <div id="auth-error" class="bg-red-50 text-primary text-sm hidden p-4 rounded-2xl border border-red-100 animate-pulse">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">error</span>
                        <span id="error-text"></span>
                    </div>
                </div>

                <!-- Login Form -->
                <div id="form-login" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold px-1 opacity-70">邮箱地址</label>
                        <input type="email" id="login-email" class="liquid-input w-full px-5 py-4 rounded-2xl outline-none" placeholder="name@example.com">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold px-1 opacity-70">访问密码</label>
                        <input type="password" id="login-password" class="liquid-input w-full px-5 py-4 rounded-2xl outline-none" placeholder="••••••••">
                    </div>
                    <button onclick="handleLogin()" id="login-btn" class="btn-primary w-full py-4 rounded-2xl text-white font-bold transition-all">立即进入</button>
                </div>

                <!-- Register Form -->
                <div id="form-register" class="hidden space-y-6">
                    <div id="reg-step-1" class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold px-1 opacity-70">注册邮箱</label>
                            <input type="email" id="register-email" class="liquid-input w-full px-5 py-4 rounded-2xl outline-none" placeholder="name@example.com">
                        </div>
                        <button onclick="handleSendOTP()" id="otp-btn" class="btn-primary w-full py-4 rounded-2xl text-white font-bold transition-all">发送验证码</button>
                    </div>

                    <div id="reg-step-2" class="hidden space-y-6">
                        <div class="bg-primary/5 p-4 rounded-2xl text-sm border border-primary/10">
                            验证码已发送至 <span id="sent-email-display" class="font-bold text-primary"></span>
                            <button onclick="resetReg()" class="ml-2 underline opacity-60 hover:opacity-100">修改邮箱</button>
                        </div>
                        <div class="space-y-4">
                            <div class="space-y-2">
                                <label class="text-sm font-semibold px-1 opacity-70">6位验证码</label>
                                <input type="text" id="register-otp" class="liquid-input w-full px-5 py-4 rounded-2xl outline-none" placeholder="000000" maxlength="6">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-semibold px-1 opacity-70">设置密码</label>
                                <input type="password" id="register-password" class="liquid-input w-full px-5 py-4 rounded-2xl outline-none" placeholder="至少6位密码">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-semibold px-1 opacity-70">确认密码</label>
                                <input type="password" id="register-password-confirm" class="liquid-input w-full px-5 py-4 rounded-2xl outline-none" placeholder="再次输入密码">
                            </div>
                        </div>
                        <button onclick="handleRegister()" id="register-btn" class="btn-primary w-full py-4 rounded-2xl text-white font-bold transition-all">完成注册</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="relative z-10 p-8 text-center text-sm opacity-40">
        &copy; 2026 壳中客 Kezhongke · Humanistic Tech
    </footer>

    <script>
        // Use relative path to avoid CORS and port issues
        const API_BASE = "/api/auth";

        function switchTab(mode) {
            const isLogin = mode === 'login';
            document.getElementById('tab-login').classList.toggle('active', isLogin);
            document.getElementById('tab-register').classList.toggle('active', !isLogin);
            document.getElementById('tab-login').classList.toggle('text-on-surface-variant/60', !isLogin);
            document.getElementById('tab-register').classList.toggle('text-on-surface-variant/60', isLogin);
            
            document.getElementById('form-login').classList.toggle('hidden', !isLogin);
            document.getElementById('form-register').classList.toggle('hidden', isLogin);
            hideError();
        }

        function showError(msg) {
            const err = document.getElementById('auth-error');
            const text = document.getElementById('error-text');
            text.innerText = msg;
            err.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('auth-error').classList.add('hidden');
        }

        function resetReg() {
            document.getElementById('reg-step-1').classList.remove('hidden');
            document.getElementById('reg-step-2').classList.add('hidden');
            hideError();
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            
            if (!email || !password) {
                showError("请填写完整登录信息");
                return;
            }
            
            hideError();
            btn.disabled = true;
            btn.innerText = "正在验证...";

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('kezhongke_token', data.access_token);
                    localStorage.setItem('kezhongke_user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    showError(data.detail || "登录失败，请检查账号密码");
                }
            } catch (e) {
                showError("网络连接异常，请检查后端服务");
            } finally {
                btn.disabled = false;
                btn.innerText = "立即进入";
            }
        }

        async function handleSendOTP() {
            const email = document.getElementById('register-email').value;
            const btn = document.getElementById('otp-btn');

            if (!email) {
                showError("请输入有效的邮箱地址");
                return;
            }

            hideError();
            btn.disabled = true;
            btn.innerText = "发送中...";

            try {
                const res = await fetch(`${API_BASE}/request-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email})
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('reg-step-1').classList.add('hidden');
                    document.getElementById('reg-step-2').classList.remove('hidden');
                    document.getElementById('sent-email-display').innerText = email;
                } else {
                    showError(data.detail || "验证码发送失败，请稍后重试");
                }
            } catch (e) {
                showError("接口请求失败，请检查网络或服务状态");
            } finally {
                btn.disabled = false;
                btn.innerText = "发送验证码";
            }
        }

        async function handleRegister() {
            const email = document.getElementById('register-email').value;
            const otp = document.getElementById('register-otp').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-password-confirm').value;
            const btn = document.getElementById('register-btn');

            if (!otp || !password || !confirm) {
                showError("请填写完整注册信息");
                return;
            }

            if (password !== confirm) {
                showError("两次输入的密码不一致");
                return;
            }

            if (password.length < 6) {
                showError("密码长度至少为 6 位");
                return;
            }

            hideError();
            btn.disabled = true;
            btn.innerText = "正在创建账户...";

            try {
                const res = await fetch(`${API_BASE}/verify-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, otp, password})
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('kezhongke_token', data.access_token);
                    localStorage.setItem('kezhongke_user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    showError(data.detail || "注册失败，验证码可能已过期");
                }
            } catch (e) {
                showError("注册请求失败");
            } finally {
                btn.disabled = false;
                btn.innerText = "完成注册";
            }
        }

        // Ambient Liquid Background
        const canvas = document.getElementById('liquid-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let points = [];
            const colors = ['rgba(255, 205, 196, 0.3)', 'rgba(178, 242, 222, 0.25)', 'rgba(220, 214, 255, 0.25)'];
            function init() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                points = [];
                for (let i = 0; i < 6; i++) {
                    points.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.4,
                        vy: (Math.random() - 0.5) * 0.4,
                        size: Math.random() * 400 + 300,
                        color: colors[i % colors.length]
                    });
                }
            }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                points.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    grad.addColorStop(0, p.color);
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', init);
            init(); animate();
        }
    </script>
</body>
</html>
